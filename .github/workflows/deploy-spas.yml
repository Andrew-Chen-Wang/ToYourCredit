name: Deploy SPAs

on:
  push:
    branches: [main]
    paths:
      - "apps/frontends/dashboard/**"
      - "apps/frontends/admin/**"
      - "lib/typescript/ui/**"
      - "lib/typescript/api-client/**"
  workflow_dispatch:
    inputs:
      spa:
        description: "Which SPA to deploy"
        required: true
        type: choice
        options:
          - all
          - dashboard
          - admin

env:
  NPM_CONFIG_FUND: false

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      admin: ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'apps/frontends/dashboard/**'
              - 'lib/typescript/ui/**'
              - 'lib/typescript/api-client/**'
            admin:
              - 'apps/frontends/admin/**'
              - 'lib/typescript/ui/**'
              - 'lib/typescript/api-client/**'

  deploy-dashboard:
    name: Deploy Dashboard
    needs: changes
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch' && (inputs.spa == 'dashboard' || inputs.spa == 'all')) ||
        (github.event_name == 'push' && needs.changes.outputs.dashboard == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.14.0"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.4.2
        with:
          max-age: 1w
          max-files: 50
          max-size: 3gb
      - name: Build Dashboard
        run: pnpm exec turbo run build --filter=dashboard
        env:
          VITE_PUBLIC_MEDIA_BASE_URL: https://media.toyourcredit.forum
      - name: Deploy to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync apps/frontends/dashboard/dist/ s3://toyourcredit-spa/dashboard/ \
            --endpoint-url ${{ secrets.R2_S3_ENDPOINT }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp apps/frontends/dashboard/dist/index.html s3://toyourcredit-spa/dashboard/index.html \
            --endpoint-url ${{ secrets.R2_S3_ENDPOINT }} \
            --cache-control "no-cache"
      - name: Purge Cloudflare cache
        run: |
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://static.toyourcredit.forum/dashboard/index.html"]}'

  deploy-admin:
    name: Deploy Admin
    needs: changes
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch' && (inputs.spa == 'admin' || inputs.spa == 'all')) ||
        (github.event_name == 'push' && needs.changes.outputs.admin == 'true')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.14.0"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache for Turbo
        uses: rharkor/caching-for-turbo@v2.4.2
        with:
          max-age: 1w
          max-files: 50
          max-size: 3gb
      - name: Build Admin
        run: pnpm exec turbo run build --filter=admin
        env:
          VITE_PUBLIC_MEDIA_BASE_URL: https://media.toyourcredit.forum
      - name: Deploy to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync apps/frontends/admin/dist/ s3://toyourcredit-spa/admin/ \
            --endpoint-url ${{ secrets.R2_S3_ENDPOINT }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp apps/frontends/admin/dist/index.html s3://toyourcredit-spa/admin/index.html \
            --endpoint-url ${{ secrets.R2_S3_ENDPOINT }} \
            --cache-control "no-cache"
      - name: Purge Cloudflare cache
        run: |
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://static.toyourcredit.forum/admin/index.html"]}'
