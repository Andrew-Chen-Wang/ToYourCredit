name: Deploy Bullground

on:
  push:
    branches: [main]
    paths:
      - "apps/bullground/**"
      - "packages/**"
      - "lib/**"
      - "!lib/typescript/api-client/**"
      - "pnpm-lock.yaml"
      - "apps/bullground/Dockerfile"
      - ".github/workflows/deploy-bullground.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      # Exposes ACTIONS_RUNTIME_TOKEN etc. so `--cache-*=type=gha` works with
      # the raw buildx CLI.
      - name: Expose GitHub runtime for buildx cache
        uses: crazy-max/ghaction-github-runtime@v3
      - name: Build and push image
        run: |
          docker buildx build --push \
            -f apps/bullground/Dockerfile \
            -t ghcr.io/andrew-chen-wang/toyourcredit-bullground:${{ github.sha }} \
            -t ghcr.io/andrew-chen-wang/toyourcredit-bullground:latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .
      - name: Deploy over SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan 40.160.59.152 >> ~/.ssh/known_hosts
          # Log the server into GHCR with this run's token so it can pull the
          # private image without a long-lived PAT on the host.
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            ssh ubuntu@40.160.59.152 "docker login ghcr.io -u ${{ github.actor }} --password-stdin"
          ssh ubuntu@40.160.59.152 "cd /opt/toyourcredit && ./deploy-bullground.sh ${{ github.sha }}"
