name: Deploy Internal API

on:
  push:
    branches: [main]
    paths:
      - "apps/internal-api/**"
      - "packages/**"
      - "lib/**"
      - "!lib/typescript/api-client/**"
      - "pnpm-lock.yaml"
      - "apps/internal-api/Dockerfile"
      - ".github/workflows/deploy-internal-api.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing GHCR image tag to redeploy (e.g. a previous commit SHA for rollback). Leave empty to build from this ref."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      # Build steps are skipped when a manual dispatch supplies image_tag —
      # that redeploys an already-pushed image (rollback / redeploy).
      - name: Log in to GHCR
        if: ${{ !inputs.image_tag }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        if: ${{ !inputs.image_tag }}
        uses: docker/setup-buildx-action@v3
      # Exposes ACTIONS_RUNTIME_TOKEN etc. so `--cache-*=type=gha` works with
      # the raw buildx CLI.
      - name: Expose GitHub runtime for buildx cache
        if: ${{ !inputs.image_tag }}
        uses: crazy-max/ghaction-github-runtime@v3
      - name: Build and push image
        if: ${{ !inputs.image_tag }}
        run: |
          docker buildx build --push \
            -f apps/internal-api/Dockerfile \
            -t ghcr.io/andrew-chen-wang/toyourcredit-internal-api:${{ github.sha }} \
            -t ghcr.io/andrew-chen-wang/toyourcredit-internal-api:latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.14.0"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Migrate and deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OVH_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan 40.160.59.152 >> ~/.ssh/known_hosts
          bin/deploy/deploy.sh api ${{ inputs.image_tag || github.sha }}
